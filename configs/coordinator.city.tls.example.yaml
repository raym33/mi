listen_addr: ":8443"
admin_token: "admin-dev-token"
tls:
  cert_file: "certs/server.crt"
  key_file: "certs/server.key"
  node_client_ca_file: "certs/ca.crt"
city:
  enabled: true
  name: "Madrid Local AI"
  require_provider_tokens: true
  usage_store_path: "data/city-usage.json"
  consumers:
    - id: "studio-a"
      display_name: "Studio A"
      total_token_limit: 250000
      api_keys:
        - "sk-mi-studio-a-dev"
  providers:
    - id: "ray-home"
      display_name: "Ray Home Macs"
      token: "pk-mi-ray-home-dev"
      privacy_mode: "private"
settlement:
  enabled: true
  chain_path: "data/settlement-chain.jsonl"
  price_per_thousand_tokens_micros: 1000
  provider_reward_share_bps: 7000
  target_latency_ms: 5000
  latency_penalty_bps: 1000
challenges:
  enabled: true
  path: "data/challenge-chain.jsonl"
  auto_run: true
  interval: "15m"
  timeout: "30s"
  model: "llama3.1:8b"
  privacy_tier: "public"
  prompt: "Reply with exactly: mi-ok"
  expected_contains: "mi-ok"
  max_tokens: 8
models:
  aliases:
    - id: "fast"
      target: "llama3.1:8b"
      display_name: "Fast local"
      description: "Low-latency shared assistant"
      tags: ["general", "fast"]
scheduler:
  max_queue_penalty: 8
