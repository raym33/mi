listen_addr: ":8080"
admin_token: "admin-dev-token"
city:
  enabled: true
  name: "Madrid Local AI"
  require_provider_tokens: true
  usage_store_path: "data/city-usage.json"
  consumers:
    - id: "studio-a"
      display_name: "Studio A"
      total_token_limit: 250000
      api_keys:
        - "sk-mi-studio-a-dev"
    - id: "dev-shop"
      display_name: "Dev Shop"
      total_token_limit: 500000
      api_keys:
        - "sk-mi-dev-shop-dev"
  providers:
    - id: "ray-home"
      display_name: "Ray Home Macs"
      token: "pk-mi-ray-home-dev"
      privacy_mode: "private"
    - id: "studio-node"
      display_name: "Studio Node"
      token: "pk-mi-studio-node-dev"
      privacy_mode: "private"
settlement:
  enabled: true
  chain_path: "data/settlement-chain.jsonl"
  price_per_thousand_tokens_micros: 1000
  provider_reward_share_bps: 7000
  target_latency_ms: 5000
  latency_penalty_bps: 1000
models:
  aliases:
    - id: "fast"
      target: "llama3.1:8b"
      display_name: "Fast local"
      description: "Low-latency shared assistant"
      tags: ["general", "fast"]
    - id: "private"
      target: "llama3.1:8b"
      display_name: "Private local"
      description: "Private city-network assistant"
      tags: ["private", "general"]
scheduler:
  max_queue_penalty: 8
